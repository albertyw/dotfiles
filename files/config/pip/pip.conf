# vim: ft=dosini

[list]
format = columns

[global]
disable-pip-version-check = True

# Do not pip install when not in a virtual environment
# https://docs.python-guide.org/dev/pip-virtualenv/#requiring-an-active-virtual-environment-for-pip
require-virtualenv = True

# Install only wheels, never source distributions
# https://github.com/lirantal/pypi-security-best-practices#1-prefer-binary-only-installs
only-binary = [":all:"]

[install]
# Install only packages that were uploaded to PyPI at least 5 days ago
# Requires at least pip 26.1
# https://github.com/lirantal/pypi-security-best-practices#22-pip-uploaded-prior-to-cooldown
uploaded-prior-to = P5D
